# yaml-language-server: $schema=https://bookbrackets.app/schema/book.schema.json
schema_version: "1"
curator: "AI: Claude"
disclaimer: "This is a personal project and is not affiliated with, endorsed by, or sponsored by The Church of Jesus Christ of Latter-day Saints. Chapter summaries and bracket annotations are AI-assisted and may contain errors. Always refer to the official scriptures for authoritative text."
slug: book-of-mormon
type: volume
title: Book of Mormon
description: >
  The Book of Mormon is scripture, a companion volume to the Bible and a
  second witness of Jesus Christ. It narrates the history, teachings, and
  spiritual experiences of ancient civilizations in the Americas, primarily
  focusing on the journey of a prophet named Lehi and his descendants. The
  book covers a period from roughly 600 B.C. to 400 A.D. and emphasizes
  themes of faith, repentance, and salvation through Jesus Christ.
children:
  - slug: overview
    type: overview
    title: Book of Mormon — Overview
    description: The 15 books of the Book of Mormon, showing their source records, authors, and content focus.
    children:
      - slug: ov-1-nephi
        type: book-entry
        description: "1 Nephi — Lehi's exodus, wilderness journey, and Nephi's visions of Christ."
      - slug: ov-2-nephi
        type: book-entry
        description: "2 Nephi — Lehi's final blessings, Isaiah chapters, and Nephi's doctrine of Christ."
      - slug: ov-jacob
        type: book-entry
        description: "Jacob — Chastity and pride sermons, the olive tree allegory, and Sherem the anti-Christ."
      - slug: ov-enos
        type: book-entry
        description: "Enos — An all-night wrestle in prayer; God covenants to preserve the Nephite record."
      - slug: ov-jarom
        type: book-entry
        description: "Jarom — A brief record; Nephites prosper through obedience to the law of Moses."
      - slug: ov-omni
        type: book-entry
        description: "Omni — Five authors in succession; Nephites discover Zarahemla and the Mulekites."
      - slug: ov-wom
        type: book-entry
        description: "Words of Mormon — Mormon's note joining the small plates to his abridgment."
      - slug: ov-mosiah
        type: book-entry
        description: "Mosiah — King Benjamin's address, Abinadi's martyrdom, and Alma founding the church."
      - slug: ov-alma
        type: book-entry
        description: "Alma — Alma the Younger's ministry, the Zoramite mission, and wars with the Lamanites."
      - slug: ov-helaman
        type: book-entry
        description: "Helaman — Gadianton robbers, Nephi's bold ministry, and Samuel the Lamanite's prophecies."
      - slug: ov-3-nephi
        type: book-entry
        description: "3 Nephi — Destruction at Christ's death, his Nephite ministry, and founding his church."
      - slug: ov-4-nephi
        type: book-entry
        description: "4 Nephi — Two centuries of Zion-like peace after Christ's visit, then slow decline."
      - slug: ov-mormon
        type: book-entry
        description: "Mormon — The final Nephite wars, Mormon's compiled record, and Moroni's additions."
      - slug: ov-ether
        type: book-entry
        description: "Ether — Moroni's abridgment of the Jaredites, from tower of Babel to their destruction."
      - slug: ov-moroni
        type: book-entry
        description: "Moroni — Church ordinances, Mormon's epistles, faith and spiritual gifts, and farewell."

