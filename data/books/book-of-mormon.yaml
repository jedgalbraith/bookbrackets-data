      - slug: alma-56
        type: chapter
        description: "Helaman's epistle: the stripling warriors fight valiantly; not one is slain."
      - slug: alma-57
        type: chapter
        description: "Helaman's epistle: the battle of Cumeni; all stripling warriors are wounded but none die."
      - slug: alma-58
        type: chapter
        description: "Helaman takes Manti through strategy and praises God for preserving his young soldiers."
      - slug: alma-59
        type: chapter
        description: "Moroni writes Pahoran demanding support; Lamanites retake the city of Nephihah."
      - slug: alma-60
        type: chapter
        description: "Moroni rebukes Pahoran for government neglect and threatens to enforce accountability."
      - slug: alma-61
        type: chapter
        description: "Pahoran replies: king-men have paralyzed the government; he asks for Moroni's help."
      - slug: alma-62
        type: chapter
        description: "Moroni and Pahoran suppress the rebellion; Teancum slays Ammoron; peace is restored."
      - slug: alma-63
        type: chapter
        description: "Shiblon receives the records; Hagoth sails ships northward; the records pass to Helaman."

  - slug: helaman
    type: book
    title: Helaman
    description: The book of Helaman records political upheaval, the rise of the Gadianton robbers, Nephi's powerful prophetic ministry, and Samuel the Lamanite's prophecies of Christ.
    url_template: "https://www.churchofjesuschrist.org/study/scriptures/bofm/hel/{index}?lang=eng"
    children:
      - slug: helaman-1
        type: chapter
        description: "Pahoran is murdered; Pacumeni becomes chief judge; Coriantumr captures Zarahemla."
      - slug: helaman-2
        type: chapter
        description: "Helaman becomes chief judge; Gadianton forms his robber band on secret oaths and flees."
      - slug: helaman-3
        type: chapter
        description: "Many Nephites migrate northward; prosperity leads to pride; Helaman keeps the records."
      - slug: helaman-4
        type: chapter
        description: "Dissenters stir the Lamanites; Nephite cities fall; the people recognize their wickedness."
      - slug: helaman-5
        type: chapter
        description: "Nephi and Lehi preach throughout the land; surrounded by fire in prison, they are freed."
      - slug: helaman-6
        type: chapter
        description: "Lamanites surpass the Nephites in righteousness; Gadianton robbers spread through both."
      - slug: helaman-7
        type: chapter
        description: "Nephi mourns from his garden tower; crowds gather to hear him rebuke the corrupt judges."
      - slug: helaman-8
        type: chapter
        description: "Judges stir the crowd against Nephi; he prophesies the murder of chief judge Seezoram."
      - slug: helaman-9
        type: chapter
        description: "Five men find Seezoram dead, confirming Nephi's prophecy; the murderer is exposed."
      - slug: helaman-10
        type: chapter
        description: "God grants Nephi the sealing power; the Spirit carries him from group to group preaching."
      - slug: helaman-11
        type: chapter
        description: "Nephi calls for a famine to humble the people; they repent; the Gadianton robbers regroup."
      - slug: helaman-12
        type: chapter
        description: "Mormon's commentary on human ingratitude and vanity, and the power and greatness of God."
      - slug: helaman-13
        type: chapter
        description: "Samuel the Lamanite preaches from the city wall and pronounces cursings on the land."
      - slug: helaman-14
        type: chapter
        description: "Samuel prophesies signs of Christ's birth — a night of light — and signs of his death."
      - slug: helaman-15
        type: chapter
        description: "Samuel declares the Lamanites are more righteous than the Nephites; they will be blessed."
      - slug: helaman-16
        type: chapter
        description: "Some Nephites believe Samuel; others try to kill him; he escapes and is never heard again."

  - slug: 3-nephi
    type: book
    title: 3 Nephi
    description: Third Nephi records the destruction at Christ's death, his personal appearance and three-day ministry at the temple in Bountiful, and the establishment of his church among the Nephites.
    url_template: "https://www.churchofjesuschrist.org/study/scriptures/bofm/3-ne/{index}?lang=eng"
    children:
      - slug: 3-nephi-1
        type: chapter
        description: "The promised sign: a night with no darkness; a new star rises; prophecy fulfilled."
      - slug: 3-nephi-2
        type: chapter
        description: "Nephites explain away the signs; the Gadianton robbers continue to grow in strength."
      - slug: 3-nephi-3
        type: chapter
        description: "Giddianhi demands surrender; Lachoneus gathers the Nephites and fortifies their camp."
      - slug: 3-nephi-4
        type: chapter
        description: "The Nephites defeat the Gadianton robbers; Giddianhi is killed; Zemnarihah hanged."
      - slug: 3-nephi-5
        type: chapter
        description: "The Nephites subdue the robbers; Mormon introduces himself and summarizes Nephite history."
      - slug: 3-nephi-6
        type: chapter
        description: "The Nephites prosper after war; pride spreads; lawyers and judges undermine the church."
      - slug: 3-nephi-7
        type: chapter
        description: "The government is overthrown; tribes form; Nephi preaches with power and raises the dead."
      - slug: 3-nephi-8
        type: chapter
        description: "The destruction at Christ's crucifixion: storms, earthquakes, and fire level whole cities."
      - slug: 3-nephi-9
        type: chapter
        description: "Christ's voice from the darkness announces wicked cities destroyed; he invites all to him."
      - slug: 3-nephi-10
        type: chapter
        description: "Silence and lamentation; Christ comforts survivors; the darkness lifts after three days."
      - slug: 3-nephi-11
        type: chapter
        description: "Christ descends to the temple at Bountiful; thousands feel his wounds; he teaches baptism."
      - slug: 3-nephi-12
        type: chapter
        description: "The Sermon at the Temple: the Beatitudes; the higher law replaces the law of Moses."
      - slug: 3-nephi-13
        type: chapter
        description: "Do not pray or give alms to be seen; the Lord's Prayer; lay up treasures in heaven."
      - slug: 3-nephi-14
        type: chapter
        description: "Judge not unrighteously; ask, seek, knock; the golden rule; the strait gate and broad way."
      - slug: 3-nephi-15
        type: chapter
        description: "Christ declares he fulfills the law; the Nephites are the other sheep he spoke of."
      - slug: 3-nephi-16
        type: chapter
        description: "Christ speaks of other sheep; Gentiles receive then reject the gospel; Israel gathered."
      - slug: 3-nephi-17
        type: chapter
        description: "Christ heals the sick, blesses the children, weeps for joy; angels minister."
      - slug: 3-nephi-18
        type: chapter
        description: "Christ institutes the sacrament; commands on prayer and not partaking unworthily."
      - slug: 3-nephi-19
        type: chapter
        description: "The disciples baptize each other; the Holy Ghost falls as fire; Christ prays for unity."
      - slug: 3-nephi-20
        type: chapter
        description: "Christ provides bread and wine; he teaches God's covenant with Israel and the Gentiles."
      - slug: 3-nephi-21
        type: chapter
        description: "The Book of Mormon signals the gathering; the New Jerusalem to be built in America."
      - slug: 3-nephi-22
        type: chapter
        description: "Christ reads Isaiah 54 — the everlasting covenant; Zion established with great glory."
      - slug: 3-nephi-23
        type: chapter
        description: "Christ commands search of the scriptures; an unfulfilled prophecy of Samuel is corrected."
      - slug: 3-nephi-24
        type: chapter
        description: "Christ reads Malachi 3: the Lord's messenger, tithing, and a book of remembrance."
      - slug: 3-nephi-25
        type: chapter
        description: "Christ reads Malachi 4: the proud burned, righteous healed; Elijah before the great day."
      - slug: 3-nephi-26
        type: chapter
        description: "Mormon summarizes Christ's ministry; the sealed portion withheld until faith grows."
      - slug: 3-nephi-27
        type: chapter
        description: "Christ teaches the name of his church; summarizes the gospel; be even as I am."
      - slug: 3-nephi-28
        type: chapter
        description: "Nine disciples choose to die; three Nephites choose to remain until the Second Coming."
      - slug: 3-nephi-29
        type: chapter
        description: "The Book of Mormon coming forth signals God has begun fulfilling his covenant with Israel."
      - slug: 3-nephi-30
        type: chapter
        description: "The Gentiles are commanded to repent, be baptized, and join the house of Israel."

  - slug: 4-nephi
    type: book
    title: 4 Nephi
    description: Fourth Nephi records nearly two centuries of Zion-like peace following Christ's visit, followed by gradual pride and the dissolution of the righteous society.
    url_template: "https://www.churchofjesuschrist.org/study/scriptures/bofm/4-ne/{index}?lang=eng"
    children:
      - slug: 4-nephi-1
        type: chapter
        description: "Two centuries of righteousness; pride returns, classes divide, and the church breaks up."

  - slug: mormon
    type: book
    title: Mormon
    description: Mormon's account of the final Nephite wars, his compilation of the sacred records, his final plea to the Lamanites, and Moroni's additions after his father's death.
    url_template: "https://www.churchofjesuschrist.org/study/scriptures/bofm/morm/{index}?lang=eng"
    children:
      - slug: mormon-1
        type: chapter
        description: "At age ten, Mormon is entrusted with the records by Ammaron; war and wickedness increase."
      - slug: mormon-2
        type: chapter
        description: "Mormon leads the Nephite armies at fifteen; the people mourn but do not repent."
      - slug: mormon-3
        type: chapter
        description: "Mormon refuses to lead after the Nephites vow revenge; he writes to future readers."
      - slug: mormon-4
        type: chapter
        description: "Nephites and Lamanites alternate victories; Nephite wickedness exceeds the Lamanites."
      - slug: mormon-5
        type: chapter
        description: "Mormon leads the failing Nephites again; he writes to the Lamanites and to future readers."
      - slug: mormon-6
        type: chapter
        description: "The final battle at Cumorah; two hundred thousand Nephites fall; Mormon laments the slain."
      - slug: mormon-7
        type: chapter
        description: "Mormon pleads with the Lamanites: believe in Christ, lay down your weapons."
      - slug: mormon-8
        type: chapter
        description: "Moroni alone finishes Mormon's record; he foresees the day the book will come forth."
      - slug: mormon-9
        type: chapter
        description: "Moroni exhorts unbelievers to repent; miracles and gifts of the Spirit have not ceased."

  - slug: ether
    type: book
    title: Ether
    description: Moroni's abridgment of the Jaredite record, tracing their history from the tower of Babel through their ocean crossing to the promised land and their eventual complete destruction.
    url_template: "https://www.churchofjesuschrist.org/study/scriptures/bofm/ether/{index}?lang=eng"
    children:
      - slug: ether-1
        type: chapter
        description: "The brother of Jared prays at the tower of Babel; God promises to lead their people."
      - slug: ether-2
        type: chapter
        description: "The Lord chastens the brother of Jared; the Jaredites reach the sea and design barges."
      - slug: ether-3
        type: chapter
        description: "The Lord shows his finger; the brother of Jared sees the pre-mortal Christ; vision sealed."
      - slug: ether-4
        type: chapter
        description: "Moroni seals the vision; it will come forth when the Gentiles repent and have faith."
      - slug: ether-5
        type: chapter
        description: "Three witnesses will testify of the plates by God's power; the sealed portion remains."
      - slug: ether-6
        type: chapter
        description: "The Jaredites sail in lighted barges singing praises; they arrive and give thanks."
      - slug: ether-7
        type: chapter
        description: "Kings from Orihah to Shule; rebellions and captivity; prophets call the people to repent."
      - slug: ether-8
        type: chapter
        description: "The first Jaredite secret combination; Akish uses oaths and plots to seize power."
      - slug: ether-9
        type: chapter
        description: "Kings from Omer to Hearthom; cycles of righteousness and wickedness; prosperity under Lib."
      - slug: ether-10
        type: chapter
        description: "More Jaredite kings; long prosperity under righteous rulers; then wickedness returns."
      - slug: ether-11
        type: chapter
        description: "Kings from Ethem to Coriantor; prophets rejected; calamities increase."
      - slug: ether-12
        type: chapter
        description: "Moroni's commentary on faith; God's strength perfected in weakness; charity is greatest."
      - slug: ether-13
        type: chapter
        description: "Ether prophesies the New Jerusalem; cast out; civil war begins among the Jaredites."
      - slug: ether-14
        type: chapter
        description: "Civil wars escalate; Shiz and Coriantumr gather their peoples for mutual destruction."
      - slug: ether-15
        type: chapter
        description: "The last battle; all are slain until only Coriantumr and Shiz remain; prophecy fulfilled."

  - slug: moroni
    type: book
    title: Moroni
    description: Moroni's final writings, containing church ordinances, two epistles from his father Mormon, and his farewell invitation to come unto Christ and receive the promise of the Book of Mormon.
    url_template: "https://www.churchofjesuschrist.org/study/scriptures/bofm/moro/{index}?lang=eng"
    children:
      - slug: moroni-1
        type: chapter
        description: "Moroni hides from the Lamanites; he writes a few more things for future readers."
      - slug: moroni-2
        type: chapter
        description: "Christ gave the disciples power to bestow the Holy Ghost by the laying on of hands."
      - slug: moroni-3
        type: chapter
        description: "The manner of ordaining priests and teachers in the church of Christ."
      - slug: moroni-4
        type: chapter
        description: "The sacramental prayer on the bread; covenant to remember Christ and keep commandments."
      - slug: moroni-5
        type: chapter
        description: "The sacramental prayer on the wine; the covenant to take upon them the name of Christ."
      - slug: moroni-6
        type: chapter
        description: "Baptism requirements; meetings led by the Holy Ghost; sacrament as a regular reminder."
      - slug: moroni-7
        type: chapter
        description: "Mormon's sermon on faith, hope, and charity; how to judge good from evil."
      - slug: moroni-8
        type: chapter
        description: "Mormon's epistle: infant baptism is an abomination; little children are alive in Christ."
      - slug: moroni-9
        type: chapter
        description: "Mormon's second epistle: both peoples are depraved; he exhorts Moroni to hold fast."
      - slug: moroni-10
        type: chapter
        description: "Moroni's farewell: pray to know the Book of Mormon is true; come unto Christ."
