  - slug: deuteronomy
    type: book
    title: Deuteronomy
    description: Deuteronomy records Moses's farewell addresses to Israel on the plains of Moab, renewing the covenant and commissioning Joshua before Moses's death.
    url_template: "https://www.churchofjesuschrist.org/study/scriptures/ot/deut/{index}?lang=eng"
    children:
      - slug: deuteronomy-1
        type: chapter
        description: "Moses reviews Israel's journey from Horeb; judges appointed; the spies sent."
      - slug: deuteronomy-2
        type: chapter
        description: "Israel's wilderness wanderings reviewed; victories over Sihon of Heshbon."
      - slug: deuteronomy-3
        type: chapter
        description: "Defeat of Og of Bashan; territory divided; Moses forbidden to cross the Jordan."
      - slug: deuteronomy-4
        type: chapter
        description: "Moses urges obedience to the law; warning against idolatry; cities of refuge."
      - slug: deuteronomy-5
        type: chapter
        description: "The Ten Commandments repeated; Israel's fear at Horeb; Moses as mediator."
      - slug: deuteronomy-6
        type: chapter
        description: "The Shema — love the Lord with all your heart; teach the commandments to children."
      - slug: deuteronomy-7
        type: chapter
        description: "Drive out the Canaanites; blessings for obedience; no intermarriage with them."
      - slug: deuteronomy-8
