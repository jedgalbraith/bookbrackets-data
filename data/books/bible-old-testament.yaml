# yaml-language-server: $schema=https://bookbrackets.app/schema/book.schema.json
schema_version: "1"
curator: "AI: Claude"
disclaimer: "This is a personal project and is not affiliated with, endorsed by, or sponsored by The Church of Jesus Christ of Latter-day Saints. Chapter summaries and bracket annotations are AI-assisted and may contain errors. Always refer to the official scriptures for authoritative text."
slug: bible-old-testament
type: testament
title: Old Testament
description: The Old Testament contains the sacred writings of ancient Israel, including the law, history, poetry, and prophecy.
children:
  - slug: overview
    type: overview
    title: Old Testament — Overview
    description: "The 12 Old Testament books covered here, from Genesis through 2 Kings."
    children:
      - slug: ov-genesis
        type: book-entry
        description: "Genesis — Creation, the patriarchs, and the covenant foundations of Israel."
      - slug: ov-exodus
        type: book-entry
        description: "Exodus — Deliverance from Egypt, the Passover, and the law given at Sinai."
      - slug: ov-leviticus
        type: book-entry
        description: "Leviticus — The laws of holiness, sacrifice, and the priesthood given through Moses."
      - slug: ov-numbers
        type: book-entry
        description: "Numbers — Israel's wilderness wanderings, rebellion, and preparations to enter Canaan."
      - slug: ov-deuteronomy
        type: book-entry
        description: "Deuteronomy — Moses's farewell sermons, covenant renewal, and his death on Mount Nebo."
      - slug: ov-joshua
        type: book-entry
        description: "Joshua — The conquest of Canaan and the allocation of the land among the twelve tribes."
      - slug: ov-judges
        type: book-entry
        description: "Judges — Cycles of apostasy, oppression, and deliverance through twelve judges."
      - slug: ov-ruth
        type: book-entry
        description: "Ruth — A Moabite widow's loyalty to Naomi and her marriage to Boaz the kinsman-redeemer."
      - slug: ov-1-samuel
        type: book-entry
        description: "1 Samuel — Samuel's ministry, Saul's reign, and David's rise as God's anointed king."
      - slug: ov-2-samuel
        type: book-entry
        description: "2 Samuel — David's reign over Israel, his great sin, and the consequences that follow."
      - slug: ov-1-kings
        type: book-entry
        description: "1 Kings — Solomon's glory, the divided kingdom, and Elijah's ministry against Baal."
      - slug: ov-2-kings
        type: book-entry
        description: "2 Kings — The fall of both kingdoms of Israel and Judah and the exile of their peoples."
      - slug: ov-1-chronicles
        type: book-entry
        description: "1 Chronicles — Israel's history from Adam to David, with focus on temple worship."
      - slug: ov-2-chronicles
        type: book-entry
        description: "2 Chronicles — Solomon's glory, the divided kingdom, and Judah through the exile."
      - slug: ov-ezra
        type: book-entry
        description: "Ezra — The return from Babylon and the rebuilding of the Jerusalem temple."
      - slug: ov-nehemiah
        type: book-entry
        description: "Nehemiah — Jerusalem's walls rebuilt and the covenant community renewed."
      - slug: ov-esther
        type: book-entry
        description: "Esther — A Jewish queen in Persia saves her people from a decree of genocide."
      - slug: ov-job
        type: book-entry
        description: "Job — Wrestling with suffering and faith through poetic dialogue with God."
      - slug: ov-psalms
        type: book-entry
        description: "Psalms — 150 sacred songs of praise, lament, thanksgiving, and Messianic prophecy."
      - slug: ov-proverbs
        type: book-entry
        description: "Proverbs — Practical wisdom sayings for righteous living, largely from Solomon."
      - slug: ov-ecclesiastes
        type: book-entry
        description: "Ecclesiastes — The Preacher explores the meaning of life under the sun."
      - slug: ov-song-of-solomon
        type: book-entry
        description: "Song of Solomon — Lyric love poetry, often read as an allegory of divine love."
      - slug: ov-isaiah
        type: book-entry
        description: "Isaiah — Judgment on Israel and Judah with sweeping visions of the coming Messiah."
      - slug: ov-jeremiah
        type: book-entry
        description: "Jeremiah — Calls Judah to repentance before Babylon destroys Jerusalem."
      - slug: ov-lamentations
        type: book-entry
        description: "Lamentations — Five anguished poems mourning the destruction of Jerusalem."
      - slug: ov-ezekiel
        type: book-entry
        description: "Ezekiel — Dramatic visions in Babylon of God's glory, judgment, and restoration."
      - slug: ov-daniel
        type: book-entry
        description: "Daniel — Faith demonstrated in Babylon alongside prophetic visions of future kingdoms."
      - slug: ov-hosea
        type: book-entry
        description: "Hosea — Hosea's marriage as a mirror of God's covenant with unfaithful Israel."
      - slug: ov-joel
        type: book-entry
        description: "Joel — The locust plague, the Day of the Lord, and the promise of the Spirit."
      - slug: ov-amos
        type: book-entry
        description: "Amos — A shepherd-prophet denounces social injustice and religious hypocrisy in Israel."
      - slug: ov-obadiah
        type: book-entry
        description: "Obadiah — Judgment on Edom for pride and treachery against God's people."
      - slug: ov-jonah
        type: book-entry
        description: "Jonah — Flees God's call, is swallowed by a fish, and reluctantly preaches to Nineveh."
      - slug: ov-micah
        type: book-entry
        description: "Micah — Indicts Judah for injustice and prophesies the Messiah's birth in Bethlehem."
      - slug: ov-nahum
        type: book-entry
        description: "Nahum — The certain destruction of Nineveh and the Assyrian Empire foretold."
      - slug: ov-habakkuk
        type: book-entry
        description: "Habakkuk — Wrestles with God over injustice and is told: the just shall live by faith."
      - slug: ov-zephaniah
        type: book-entry
        description: "Zephaniah — Warns of the Day of the Lord and promises restoration for the faithful."
      - slug: ov-haggai
        type: book-entry
        description: "Haggai — Urges the returned exiles to rebuild the temple above their own homes."
      - slug: ov-zechariah
        type: book-entry
        description: "Zechariah — Post-exilic visions of restoration and rich Messianic prophecy."
      - slug: ov-malachi
        type: book-entry
        description: "Malachi — Rebukes spiritual apathy and promises the coming forerunner of the Lord."

