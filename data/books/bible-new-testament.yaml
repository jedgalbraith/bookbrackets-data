title: New Testament
description: The New Testament records the life and teachings of Jesus Christ, the establishment of the early church, and apostolic letters to Christian communities.
children:
  - slug: gospels-overview
    type: overview
    title: The Gospels — Overview
    children:
      - slug: ov-matthew
        type: overview-item
        description: Matthew — A Jewish Christian account presenting Jesus as the promised Messiah and King.
      - slug: ov-mark
        type: overview-item
        description: Mark — A fast-paced Gentile-oriented account of Jesus as the powerful Servant.
      - slug: ov-luke
        type: overview-item
