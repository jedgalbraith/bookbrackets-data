      - slug: mark-12
        type: chapter
        description: "Wicked tenants; taxes, resurrection, greatest commandment; the widow's mite."
      - slug: mark-13
        type: chapter
        description: "The Olivet Discourse — signs of the end times and watchfulness."
      - slug: mark-14
        type: chapter
