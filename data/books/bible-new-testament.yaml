  - slug: matthew
    type: book
    title: Matthew
    description: Matthew presents Jesus as the promised Messiah and King, written primarily for a Jewish audience with extensive fulfillment of Old Testament prophecy.
    url_template: "https://www.churchofjesuschrist.org/study/scriptures/nt/matt/{index}?lang=eng"
    children:
      - slug: matthew-1
        type: chapter
        description: "Jesus's genealogy through Abraham and David; the birth of Jesus announced to Joseph."
      - slug: matthew-2
        type: chapter
        description: "The Magi visit the child Jesus; the flight to Egypt; the massacre of the innocents."
      - slug: matthew-3
        type: chapter
        description: "John the Baptist preaches repentance; Jesus is baptized by John."
      - slug: matthew-4
        type: chapter
        description: "Jesus tempted in the wilderness; Galilean ministry begins; first disciples called."
      - slug: matthew-5
        type: chapter
        description: "Sermon on the Mount — Beatitudes, salt and light, fulfillment of the law."
      - slug: matthew-6
        type: chapter
        description: "Sermon on the Mount — almsgiving, the Lord's Prayer, fasting, anxiety."
      - slug: matthew-7
        type: chapter
        description: "Sermon on the Mount concludes — judging others, the narrow way, the two foundations."
      - slug: matthew-8
        type: chapter
        description: "Jesus heals a leper, the centurion's servant, and many others; calms the storm."
      - slug: matthew-9
        type: chapter
        description: "Jesus heals a paralytic, raises Jairus's daughter, and calls Matthew."
      - slug: matthew-10
        type: chapter
        description: "The twelve apostles commissioned and sent out."
      - slug: matthew-11
        type: chapter
        description: "John the Baptist's question from prison; Jesus commends John; 'Come unto me.'"
      - slug: matthew-12
        type: chapter
        description: "Sabbath controversies; the Pharisees plot against Jesus; the sign of Jonah."
      - slug: matthew-13
        type: chapter
        description: "Parables of the kingdom — sower, wheat and tares, mustard seed, treasure, pearl."
      - slug: matthew-14
        type: chapter
        description: "Death of John the Baptist; feeding the five thousand; Jesus walks on water."
      - slug: matthew-15
        type: chapter
        description: "Controversies over tradition; the Canaanite woman's faith; feeding the four thousand."
      - slug: matthew-16
        type: chapter
        description: "Peter's confession at Caesarea Philippi; the first passion prediction."
      - slug: matthew-17
        type: chapter
        description: "The Transfiguration; healing an epileptic boy; the second passion prediction."
      - slug: matthew-18
        type: chapter
        description: "The greatest in the kingdom; forgiveness; the unforgiving servant."
      - slug: matthew-19
        type: chapter
        description: "Teaching on divorce; children blessed; the rich young ruler."
      - slug: matthew-20
        type: chapter
        description: "Workers in the vineyard; the third passion prediction; Bartimaeus healed."
      - slug: matthew-21
        type: chapter
        description: "The triumphal entry; cleansing the temple; parables of the two sons and wicked tenants."
      - slug: matthew-22
        type: chapter
        description: "Wedding banquet parable; debate over taxes, resurrection, and the greatest commandment."
      - slug: matthew-23
        type: chapter
        description: "Jesus denounces the scribes and Pharisees — the seven woes."
      - slug: matthew-24
        type: chapter
        description: "The Olivet Discourse — signs of the end times and the coming of the Son of Man."
      - slug: matthew-25
        type: chapter
        description: "Parables of the ten virgins and talents; the judgment of the nations."
      - slug: matthew-26
        type: chapter
        description: "Last Supper; Gethsemane; betrayal; Peter's denial; trial before the high priest."
      - slug: matthew-27
        type: chapter
        description: "Trial before Pilate; crucifixion and burial of Jesus."
      - slug: matthew-28
        type: chapter
        description: "The resurrection; the Great Commission given to the eleven."

