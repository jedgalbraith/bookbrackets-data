# yaml-language-server: $schema=https://bookbrackets.app/schema/brackets.schema.json
schema_version: "1"
slug: book-of-mormon
curator: "AI: Claude"
title: Book of Mormon — Thematic Analysis
book_slug: book-of-mormon
targets:
  - target_slug: overview
    default_right: years
    drills_into:
      - 1-nephi
      - 2-nephi
      - jacob
      - enos
      - jarom
      - omni
      - words-of-mormon
      - mosiah
      - alma
      - helaman
      - 3-nephi
      - 4-nephi
      - mormon
      - ether
      - moroni
    topics:
      - slug: source-records
        title: Source Records
        description: Which ancient record or plates each book derives from.
        brackets:
          - range: "1-6"
            label: Small Plates of Nephi
          - range: "7"
            label: Words of Mormon (bridge)
          - range: "8-13"
            label: Mormon's abridgment of the Large Plates
          - range: "14"
            label: Plates of Ether (abridged by Moroni)
          - range: "15"
            label: Moroni's own writings

      - slug: focus
        title: Content Focus
        description: The primary emphasis of each section, as described in the introduction to the Book of Mormon.
        brackets:
          - range: "1-6"
            label: Spiritual and prophetic (small plates)
          - range: "7"
            label: Editorial transition
          - range: "8-12"
            label: Historical narrative — wars, society
          - range: "13"
            label: Final wars and destruction
          - range: "14"
            label: Ancient Jaredite history
          - range: "15"
            label: Doctrine, ordinances, and farewell

      - slug: authors
        title: Authors
        description: Who wrote or compiled each book.
        brackets:
          - range: "1-2"
            label: Nephi
          - range: "3"
            label: Jacob
          - range: "4"
            label: Enos
          - range: "5"
            label: Jarom
          - range: "6"
            label: Multiple authors (Omni–Amaleki)
          - range: "7-13"
            label: Mormon (compiler)
          - range: "14-15"
            label: Moroni

      - slug: christ-arc
        title: Christ Arc
        description: Each book's relationship to Christ's mortal ministry among the Nephites.
        brackets:
          - range: "1-10"
            label: Prophesying of Christ's coming
          - range: "11"
            label: Christ ministers personally
          - range: "12-13"
            label: Post-Christ Nephite era
          - range: "14"
            label: Jaredite faith — no mortal visit
          - range: "15"
            label: Final witness and invitation

      - slug: narrative-form
        title: Narrative Form
        description: The literary form of each book.
        brackets:
          - range: "1-2"
            label: First-person spiritual autobiography
          - range: "3-6"
            label: Brief successive personal records
          - range: "7"
            label: Editorial bridge
          - range: "8-13"
            label: Abridged historical narrative
          - range: "14"
            label: Abridged ancient record
          - range: "15"
            label: Doctrinal writings and epistles

      - slug: pride-cycle
        title: Pride Cycle
        description: Where each book falls in the recurring pattern of righteousness, pride, apostasy, and destruction.
        brackets:
          - range: "1-3"
            label: Founding the covenant community
          - range: "4-6"
            label: Passing the record through generations
          - range: "7"
            label: Historical pivot point
          - range: "8-10"
            label: Cycles of faith, apostasy, and war
          - range: "11"
            label: The pinnacle — Christ visits
          - range: "12"
            label: Zion achieved, then lost
          - range: "13"
            label: Final Nephite collapse
          - range: "14"
            label: Jaredite parallel — same cycle
          - range: "15"
            label: Witness preserved for the latter days

      - slug: years
        title: Years
        description: Approximate time period covered by each book.
        brackets:
          - range: "1-3"
            label: "~600–500 B.C."
          - range: "4-6"
            label: "~500–130 B.C."
          - range: "7-10"
            label: "~130–1 B.C."
          - range: "11"
            label: "~1 B.C.–A.D. 34"
          - range: "12-13"
            label: "A.D. 35–385"
          - range: "14"
            label: Tower of Babel to ~600 B.C.
          - range: "15"
            label: "A.D. 385–421"

