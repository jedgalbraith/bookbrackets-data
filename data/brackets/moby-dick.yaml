# yaml-language-server: $schema=https://bookbrackets.app/schema/brackets.schema.json
schema_version: "1"
author: "AI: Claude"
title: Moby-Dick — Thematic Analysis
book_slug: moby-dick
targets:
  - target_slug: md-chapters
    topics:
      - slug: voyage-phases
        title: Voyage Phases
        description: The five stages of the Pequod's journey from port to catastrophe.
        brackets:
          - range: "1-22"
            label: New Bedford & Nantucket
          - range: "23-46"
            label: Ahab revealed; the fatal oath
          - range: "47-99"
            label: Open ocean — hunting and wandering
          - range: "100-132"
            label: Closing in — omens and encounters
          - range: "133-136"
            label: The three-day chase

      - slug: the-gams
        title: The Gams
        description: >
          The nine ship encounters that trace an arc from eerie silence to
          imminent doom — each gam brings Moby Dick closer.
        brackets:
          - range: "52-52"
            label: Albatross — eerie first meeting
          - range: "54-54"
            label: Town-Ho — Moby Dick strikes again
          - range: "71-71"
            label: Jeroboam — a mad prophet warns them
          - range: "81-81"
            label: Virgin — never heard of Moby Dick
          - range: "91-91"
            label: Rose-Bud — blissful ignorance
          - range: "100-100"
            label: Samuel Enderby — another victim
          - range: "115-115"
            label: Bachelor — homeward, joyful contrast
          - range: "128-128"
            label: Rachel — lost son; Ahab refuses
          - range: "131-131"
            label: Delight — just wrecked by Moby Dick

      - slug: cetology-clusters
        title: Cetology Clusters
        description: >
          Where Melville interrupts the narrative with whale science,
          philosophy, and digression — scattered across all 135 chapters.
        brackets:
          - range: "24-24"
            label: Essay — in defense of whaling
          - range: "32-32"
            label: Whale taxonomy
          - range: "42-42"
            label: The whiteness of the whale
          - range: "45-45"
            label: Documentary evidence
          - range: "53-53"
            label: Custom of the gam
          - range: "55-57"
            label: Whale in art and imagery
          - range: "58-60"
            label: Natural history — brit, squid, line
          - range: "62-63"
            label: Whaling technique
          - range: "65-65"
            label: Whale as food
          - range: "68-69"
            label: Whale skin and funeral
          - range: "74-77"
            label: Anatomy — the whale's heads
          - range: "79-80"
            label: Anatomy — face and brain
          - range: "82-83"
            label: Whaling mythology
          - range: "85-86"
            label: Spout and tail
          - range: "88-90"
            label: Whale society and maritime law
          - range: "92-92"
            label: Ambergris
          - range: "95-95"
            label: The cassock
          - range: "102-105"
            label: Fossil whales and deep time