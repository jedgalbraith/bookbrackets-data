# yaml-language-server: $schema=https://raw.githubusercontent.com/jedgalbraith/bookbrackets-data/main/schema/brackets.schema.json

schema_version: "1"
slug: jacob-5-brackets
curator: "Jed Galbraith"
title: "Jacob 5: The Allegory of the Olive Tree"
book_slug: book-of-mormon-jacob-5

targets:
