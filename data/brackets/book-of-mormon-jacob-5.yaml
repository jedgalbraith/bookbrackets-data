          - range: "1-6"
            label: House of Israel decays
          - range: "7-14"
            label: Scattering & grafting of Gentiles
          - range: "15-28"
            label: Apostolic era — good fruit
          - range: "29-49"
            label: Great Apostasy
          - range: "50-74"
            label: Restoration & gathering
          - range: "75-77"
            label: Millennium & final burning
      - slug: characters
        title: Characters
        description: "Who acts in each section of the allegory."
        brackets:
          - range: "3-4"
            label: Master alone
          - range: "7-14"
            label: Master & servant labor together
          - range: "15-49"
            label: Master & servant inspect together
          - range: "50-60"
