      - slug: visits
        title: Master's Visits to the Vineyard
        description: "The allegory is structured around the master of the vineyard's successive visits."
        brackets:
          - range: "1-14"
            label: Setup & first labor
          - range: "15-28"
            label: Second visit — branches checked
          - range: "29-49"
            label: Third visit — corruption found
          - range: "50-77"
            label: Final visit — last labor
      - slug: dispensations
        title: Dispensations of Israel
        description: "Mapping the allegory to the scattering and gathering of Israel."
